name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        run: python -m unittest discover semver/tests/ -v

      - name: Run CLI smoke checks
        shell: bash
        run: |
          python semver/scripts/semver_tool.py validate "1.0.0-alpha.beta+sha.abc"
          python semver/scripts/semver_tool.py parse    "2.4.7-rc.2+build.91"
          python semver/scripts/semver_tool.py compare  "1.0.0-rc.2" "1.0.0-rc.11"
          python semver/scripts/semver_tool.py bump     "2.4.7" minor
          python semver/scripts/semver_tool.py bump     "1.0.0-rc.7" release
          python semver/scripts/semver_tool.py sort     1.0.0 1.0.0-rc.1 1.0.0-alpha 1.0.0-beta

  validate-skill-structure:
    name: Validate Skill structure
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify SKILL.md frontmatter and structure
        run: |
          # SKILL.md must exist at the root of the skill directory
          test -f semver/SKILL.md || { echo "Missing semver/SKILL.md"; exit 1; }

          # Frontmatter must declare name and description
          head -20 semver/SKILL.md | grep -q "^name: semver$" \
            || { echo "Missing or wrong 'name:' in SKILL.md frontmatter"; exit 1; }
          head -20 semver/SKILL.md | grep -q "^description: " \
            || { echo "Missing 'description:' in SKILL.md frontmatter"; exit 1; }

          # Required reference files must exist
          for f in spec.md decision-guide.md precedence.md prerelease.md ecosystem.md; do
            test -f "semver/references/$f" \
              || { echo "Missing semver/references/$f"; exit 1; }
          done

          # Script must be executable as a module
          python semver/scripts/semver_tool.py --help > /dev/null

          echo "Skill structure OK"
